<!DOCTYPE html>
<html>
<head>
	<title>Run Python Script with PHP</title>
</head>
<body>
	<h1>Run Python Script with PHP</h1>
	<button onclick="runScript()">Run Script</button>
	<div id="output"></div>
	<script>
		function runScript() {
			var xhr = new XMLHttpRequest();
			xhr.open('GET', 'scriptdummy.php', true);
			xhr.onload = function() {
				if (xhr.status == 200) {
					document.getElementById('output').innerHTML = xhr.responseText;
				} else {
					alert('Error: ' + xhr.statusText);
				}
			};
			xhr.send();
		}
	</script>
</body>
</html>
