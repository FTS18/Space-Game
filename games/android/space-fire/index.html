  <style>
    canvas {
      border: 2px solid #222;
      border-radius: 6px;
      background-color: black;
      position: absolute;
      width: auto;
      min-width: 63%;
      max-width: 94%;
      height: 81.5%;
      margin: 2.5vw;
      margin-top: 100px;
      font-weight: 700px;
      transition: 0.5s ease-in-out;
      transform: translate (-50%, -50%);
    }

    body {
      background: #0f0f0f;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      transition: 0.3s ease-in-out;
    }

    .joystick {
      border: 1px solid #666;
      background: #000;
      position: absolute;
      overflow: hidden;
      display: none;
      bottom: 5%;
      left: 3%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      transition: 0.25s ease-in-out;
    }

    .key {
      background: #222;
      position: absolute;
      outline: none;
      border: 0;
      border-radius: 40%;
      z-index: 500;
      transition: 0.25s ease-in-out
    }

    .key:hover {
      background: #ff0030;
      border: 2px solid #333;
      z-index: 500;
      border-radius: 50%;
    }

    .top {
      top: -10%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 150px;
    }

    .bottom {
      top: 110%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 150px;
    }

    .right {
      top: 75px;
      left: 111%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 40px;
    }

    .left {
      top: 75px;
      left: -11%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 40px;
    }

    @media only screen and (max-width:700px) {
      canvas {
        height: auto;
        min-height: 50%;
        max-height: 55%;
        width: 94%;
        border: 2px solid #222222;
        margin-top: 100px;
        transition: 0.3s ease-in-out;
      }

      .joystick {
        display: block;
      }
    }
  </style>

    var myGameArea = {
      canvas: document.createElement("canvas"),
      start: function() {
        this.canvas.width = 1200;
        this.canvas.height = 900;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 1;
        this.interval = setInterval(updateGameArea, 5);
        window.addEventListener('keydown', function(e) {
          myGameArea.keys = (myGameArea.keys || []);
          myGameArea.keys[e.keyCode] = true;
        })
        window.addEventListener('keyup', function(e) {
          myGameArea.keys[e.keyCode] = false;
        })
        window.addEventListener('touchmove', function(e) {
          myGameArea.x = e.touches[0].screenX;
          myGameArea.y = e.touches[0].screenY;
        })
      },
      clear: function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
      },
      stop: function() {
        clearInterval(this.interval);
        myGameArea.clear();
        myovers.text = "GAME OVER";
        myovers.update();
        myscores.text = "YOUR SCORE: " + myGameArea.frameNo;
        myscores.update();
        mycsl.text = "COINS COLLECTED:" + coinscore;
        mycsl.update();
        var x = document.getElementById("back");
        x.textContent = "BACK";
      },
      nextlevel: function() {
        clearInterval(this.interval);
        myGameArea.clear();
        myovers.text = "LEVEL 1 COMPLETE";
        myovers.update();
        myscores.text = "YOU SCORE: " + myGameArea.frameNo;
        myscores.update();
        mycsl.text = "COIN COLLECTED:" + coinscore;
        mycsl.update();
        myGameArea.start();
        var x = document.getElementById("back");
        x.textContent = "BACK";
      }
    }

    function component(width, height, color, x, y, type) {
      this.type = type;
      if (type == "image" || type == "background") {
        this.image = new Image();
        this.image.src = color;
      }
      this.width = width;
      this.height = height;
      this.speedX = 0;
      this.speedY = 0;
      this.x = x;
      this.y = y;
      this.update = function() {
        ctx = myGameArea.context;
        if (this.type == "text") {
          ctx.font = this.width + " " + this.height;
          ctx.fillStyle = color;
          ctx.fillText(this.text, this.x, this.y);
        }
        if (type == "image" || type == "background") {
          ctx.drawImage(this.image,
            this.x,
            this.y,
            this.width, this.height);
          if (type == "background") {
            ctx.drawImage(this.image,
              this.x + this.width,
              this.y,
              this.width, this.height);
          }
        } else {
          ctx.fillStyle = color;
          ctx.fillRect(this.x, this.y, this.width, this.height);
        }
      }
      this.newPos = function() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.type == "background") {
          if (this.x == -(this.width)) {
            this.x = 0;
          }
        }
      }
      this.crashWith = function(otherobj) {
        var myleft = this.x;
        var myright = this.x + (this.width);
        var mytop = this.y;
        var mybottom = this.y + (this.height);
        var otherleft = otherobj.x;
        var otherright = otherobj.x + (otherobj.width);
        var othertop = otherobj.y;
        var otherbottom = otherobj.y + (otherobj.height);
        var crash = true;
        if ((mybottom < othertop) || (mytop > otherbottom) || (myright < otherleft) || (myleft > otherright)) {
          crash = false;
        }
        return crash;
      }
    }

    function updateGameArea() {
      var x, height, gap, minHeight, maxHeight, minGap, maxGap;
      for (i = 0; i < myObstacles.length; i += 1) {
        if (myGamePiece.crashWith(myObstacles[i])) {
          mysound.stop();
          myMusic.play();
          myGameArea.stop();
          return;
        }
      }
      myGameArea.clear();
      mybackground.speedX = -4;
      myGamePiece.speedX = 0;
      mybackground.newPos();
      mybackground.update();
      mysound.play();
      mycoin.newPos();
      mycoin.update();
      myGamePiece.newPos();
      myGamePiece.update();
      myscore.text = "SCORE: " + myGameArea.frameNo;
      myscore.update();
      mycs.text = "COINS: " + coinscore;
      mycs.update();
      myGameArea.frameNo += 1;
      if (myGameArea.frameNo == 1 || everyinterval(400)) {
        x = myGameArea.canvas.width;
        minHeight = 75;
        maxHeight = 550;
        height = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
        minGap = 200;
        maxGap = 500;
        gap = Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
        myObstacles.push(new component(25, height, "asteriod.png", x, 0, "image"));
        myObstacles.push(new component(25, x - height - gap, "asteriod2.png", x, height + gap, "image"));
      }
      for (i = 0; i < myObstacles.length; i += 1) {
        myObstacles[i].x += -1;
        myObstacles[i].update();
      }
      if (myGameArea.key && myGameArea.key == 32) {
        mybullet = new component(20, 10, "trail.png", myGamePiece.x, myGamePiece.y + 37, "image");
        mybullet1 = new component(20, 10, "trail.png", myGamePiece.x + 30, myGamePiece.y + 37, "image");
        mybullet.speedX = 6;
        mybullet1.speedX = 6;
        mybulletsound.play();
        setTimeout(() => {
          mybulletsound.stop();
        }, 500);
      }
      if (myGameArea.keys && myGameArea.keys[37]) {
        myGamePiece.speedX = -1;
      }
      if (myGameArea.keys && myGameArea.keys[39]) {
        myGamePiece.speedX = 1;
      }
      if (myGameArea.keys && myGameArea.keys[38]) {
        myGamePiece.speedY = -1;
      }
      if (myGameArea.keys && myGameArea.keys[40]) {
        myGamePiece.speedY = 1;
      }
      //mybullet.newPos();
      //mybullet.update();
      //mybullet1.newPos();
      //mybullet1.update();
      //if (mybullet1.x == mycoin.x) {
      //if (mybullet1.y <= (mycoin.y + 30) || (mybullet1.y == mycoin.y)) {
      //if (mybullet1.y >= (mycoin.y - 60) || (mybullet1.y == mycoin.y)) {
      //coinscore += zeros;
      //mycoin = new component(30, 30, "coin.png", Math.floor((Math.random() * 1200) + 1), Math.floor((Math.random() * 600) + 1), "image");
      //}
      //}
      //}
      //Touchscreen
      if (myGameArea.x && myGameArea.y) {
        myGamePiece.x = 2.5*myGameArea.x;
        myGamePiece.y = myGameArea.y;
      }
      myGamePiece.update()
    }

    function sound(src) {
      this.sound = document.createElement("audio");
      this.sound.src = src;
      this.sound.setAttribute("preload", "auto");
      this.sound.setAttribute("controls", "none");
      this.sound.style.display = "none";
      this.sound.loop = false;
      document.body.appendChild(this.sound);
      this.play = function() {
        this.sound.play();
      }
      this.stop = function() {
        this.sound.pause();
      }
    }

    function everyinterval(n) {
      if ((myGameArea.frameNo / n) % 1 == 0) {
        return true;
      }
      return false;
    }

      myGamePiece.speedX = 0;
      myGamePiece.speedY = 0;
    }

      myGamePiece.speedX = 0;
      myGamePiece.speedY = 0;

      myGamePiece.speedY -= 2;
    }

      myGamePiece.speedY += 2;
    }

    }

      myGamePiece.speedX += 2;
