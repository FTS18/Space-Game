<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Space Fire | Android</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="theme-color" content="#000">
    <meta name="msapplication-navbutton-color" content="#000">
    <meta name="apple-mobile-web-app-status-bar-style" content="#000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/assets/css/theme.css" type="text/css" media="all" />
    <script src="../../../components/header.js"></script>
    <script src="../../../assets/js/main.js"></script>
    <script src="../../../assets/js/game.js"></script>
    <base href="../../../">
    <script src="https://kit.fontawesome.com/28917c5b69.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <style>
        c-nav2 {
            z-index: 1000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
    <script>
        function closef() {
            var promptx = document.querySelector(".rating");
            promptx.style.display = "none"
        }
    </script>
</head>

<body class="disabledScroll" onload="startGame();" bgcolor="#000">
    <div class="loading-screen">
        <div class="loader"></div>
        <div class="anim"></div>
    </div>
    <div class="ripple"></div>
    <c-nav2></c-nav2>
    <div class="joystick">
        <div class="key top" onclick="moveUp()"></div>
        <div class="key left" onclick="moveLeft()"></div>
        <div class="key right" onclick="moveRight()"></div>
        <div class="key bottom" onclick="moveLeft()"></div>
    </div>
    <div class="rating">
        <div class="radio-stars">
            <input class="sr-only" id="radio-5" name="radio-star" type="radio" value="5" />
            <label class="radio-star" for="radio-5">5</label>
            <input class="sr-only" id="radio-4" name="radio-star" type="radio" value="4" />
            <label class="radio-star" for="radio-4">4</label>
            <input class="sr-only" id="radio-3" name="radio-star" type="radio" value="3" />
            <label checked="" false class="radio-star" for="radio-3">3</label>
            <input class="sr-only" id="radio-2" name="radio-star" type="radio" value="2" />
            <label class="radio-star" for="radio-2">2</label>
            <input class="sr-only" id="radio-1" name="radio-star" type="radio" value="1" />
            <label class="radio-star" for="radio-1">1</label>
            <span class="radio-star-total"></span>
        </div>
        <div class="close" onclick="closeModal()"><i class="fas fa-times"></i></div>
    </div>
    <div id="back" onclick="window.location.reload()">REPLAY</div>
</body>

</html>
