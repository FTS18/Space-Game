<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
canvas {
    border:10px solid red;
    background-color: black;
}
.button {
  border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
}

.button1 {background-color: GREEN;}
.button2 {background-color: RED;}

</style>
</head>
<body bgcolor="BLACK" onload="startGame()">

<script>
var myObstacles = [];
var myMusic;
var myscore;
var myovers;
var myscores;
var myscorec;
var mybackground;
var mysound;
var mypos;
var myposs;
var mybullet;
var mybulletspeed;
var mybullet1;
var mybulletsound;
var mycoin;
var mycs;
var coinscore;
var zeros;
var mycsl;
var myGamePiece;
var ufo;
var ufobullet;
var myhealth;
var health;

function startGame() {
    document.body.innerHTML = '';
    myGamePiece = new component(160, 90, "ghg.png", 10, 120, "image");
    mybackground = new component(1490, 650, "background.jpg", 0, 0, "background");
    myMusic = new sound("Recording.m4a");
    mysound = new sound("ACRON.mp3");
    myscore = new component("15px", "Consolas", "yellow", 1300, 15, "text");
    myhealth = new component("15px", "Consolas", "yellow", 1300, 15, "text");
    myovers = new component("100px", "Consolas", "red", 500, 300, "text");
    myscores = new component("50px", "Consolas", "yellow", 550, 450, "text");
    mycs = new component("15px", "Consolas", "yellow", 1000, 15, "text");
    mypos = this.x;
    myposs = this.y;
    mybulletsound = new sound("bullet.mp3");
    mycoin = new component(100, 50, "UFO2.png", Math.floor((Math.random() * 1400) + 1), Math.floor((Math.random() * 600) + 1), "image");
    mybullet = new component(20, 10, "h.jpg", myGamePiece.x, myGamePiece.y + 37, "image");
    mybullet1 = new component(20, 10, "h.jpg", myGamePiece.x + 30, myGamePiece.y + 37, "image");
    myGameArea.start();
    coinscore = 0;
    health = 0;
    zeros = 1;
    mycsl = new component("25px", "Consolas", "yellow", 650, 500, "text");
    myhealth = new component("25px", "Consolas", "yellow", 500, 500, "text");
    ufobullet = new component(20, 10, "h.jpg", mycoin.x, mycoin.y + 37, "image");
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = 1490;
        this.canvas.height = 650;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 0;
        this.interval = setInterval(updateGameArea, 20);
        window.addEventListener('keydown', function (e) {
            myGameArea.key = e.keyCode;
        })
        window.addEventListener('keyup', function (e) {
            myGameArea.key = false;
        })
        },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    },
    stop : function() {
        clearInterval(this.interval);
        myGameArea.clear();
        myovers.text="GAME OVER.";
        myovers.update();
        myscores.text="YOU SCORE: " + myGameArea.frameNo;
        myscores.update();
        mycsl.text="UFO DESTROYED:" + coinscore;
        mycsl.update();
        var x = document.getElementById("back");
        x.textContent = "BACK";
    },
    nextlevel : function() {
        clearInterval(this.interval);
        myGameArea.clear();
        myovers.text="LEVEL 1 COMPLETE.";
        myovers.update();
        myscores.text="YOU SCORE: " + myGameArea.frameNo;
        myscores.update();
        mycsl.text="UFO DESTROYED:" + coinscore;
        mycsl.update();
        myGameArea.start();
        var x = document.getElementById("back");
        x.textContent = "BACK";
    }
}

function component(width, height, color, x, y, type) {
    this.type = type;
    if (type == "image" || type == "background") {
        this.image = new Image();
        this.image.src = color;
    }
    this.width = width;
    this.height = height;
    this.speedX = 0;
    this.speedY = 0;    
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        if (this.type == "text" ) {
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = color;
            ctx.fillText(this.text, this.x, this.y);
}
        if (type == "image" || type == "background") {
            ctx.drawImage(this.image, 
                this.x, 
                this.y,
                this.width, this.height);
        if (type == "background") {
            ctx.drawImage(this.image, 
                this.x + this.width, 
                this.y,
                this.width, this.height);
        }
        } else {
            ctx.fillStyle = color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
    this.newPos = function() {
        this.x += this.speedX;
        this.y += this.speedY; 
        if (this.type == "background") {
            if (this.x == -(this.width)) {
                this.x = 0;
            }
        }       
    }
    this.crashWith = function(otherobj) {
        var myleft = this.x;
        var myright = this.x + (this.width);
        var mytop = this.y;
        var mybottom = this.y + (this.height);
        var otherleft = otherobj.x;
        var otherright = otherobj.x + (otherobj.width);
        var othertop = otherobj.y;
        var otherbottom = otherobj.y + (otherobj.height);
        var crash = true;
        if ((mybottom < othertop) || (mytop > otherbottom) || (myright < otherleft) || (myleft > otherright)) {
            crash = false;
        }
        return crash;
    }
}

function updateGameArea() {
    var x, height, gap, minHeight, maxHeight, minGap, maxGap;
    for (i = 0; i < myObstacles.length; i += 1) {
        if (myGamePiece.crashWith(myObstacles[i])) {
            mysound.stop();
            myMusic.play();
            myGameArea.stop();
            return;
        } 
    }
    myGameArea.clear();
    mybackground.speedX = -1;
    mybackground.newPos();    
    mybackground.update();
    mysound.play();
    mycoin.newPos();
    mycoin.update();
    myGamePiece.newPos();    
    myGamePiece.update();
    myscore.text="SCORE: " + myGameArea.frameNo;
    myscore.update();
    mycs.text="UFO DESTROYED: " + coinscore;
    mycs.update();
    myhealth.text="HEALTH:" + health;
    myhealth.update();
    myGameArea.frameNo += 1;
    if (myGameArea.frameNo == 1 || everyinterval(300)) {
        x = myGameArea.canvas.width;
        minHeight = 85;
        maxHeight = 570;
        height = Math.floor(Math.random()*(maxHeight-minHeight+1)+minHeight);
        minGap = 150;
        maxGap = 350;
        gap = Math.floor(Math.random()*(maxGap-minGap+1)+minGap);
        myObstacles.push(new component(25, height, "asteriod.png", x, 0, "image"));
        myObstacles.push(new component(25, x - height - gap, "asteriod2.png", x, height + gap, "image"));
    }
    for (i = 0; i < myObstacles.length; i += 1) {
        myObstacles[i].x += -1;
        myObstacles[i].update();
    }
    if (myGameArea.key && myGameArea.key == 32) {
    mybullet = new component(20, 10, "h.jpg", myGamePiece.x, myGamePiece.y + 37, "image");
    mybullet1 = new component(20, 10, "h.jpg", myGamePiece.x + 30, myGamePiece.y + 37, "image");
    mybullet.speedX = 6;
    mybullet1.speedX = 6;
    mybulletsound.play();
    setTimeout(() => { mybulletsound.stop(); }, 800);
    }
    if (myGameArea.key && myGameArea.key == 37) {myGamePiece.speedX = -1; }
    if (myGameArea.key && myGameArea.key == 39) {myGamePiece.speedX = 2; }
    if (myGameArea.key && myGameArea.key == 38) {myGamePiece.speedY = -2; }
    if (myGameArea.key && myGameArea.key == 40) {myGamePiece.speedY = 2; }
    mybullet.newPos();
    mybullet.update();
    mybullet1.newPos();
    mybullet1.update();
    ufobullet.newPos();
    ufobullet.update();
    if ( mybullet1.x == mycoin.x && mybullet1.y <= (mycoin.y + 80) && mybullet1.y >= (mycoin.y - 80) ) {
                coinscore += zeros;
                mycoin = new component(100, 50, "UFO2.png", Math.floor((Math.random() * 1400) + 1), Math.floor((Math.random() * 600) + 1), "image");
		bulletfire();
    }

    if ( ufobullet.y <= (myGamePiece.y + 40) && ufobullet.y >= (myGamePiece.y - 40) && ufobullet.x <= (myGamePiece.x + 60) && ufobullet.x >= (myGamePiece.x - 60)) {
	health = zeros++;
	
	if (health >= 5) {
	 mysound.stop();
            myMusic.play();
            myGameArea.stop();
            return;
	}
    }
	
    
    if ( ufobullet.y == myGamePiece.y && ufobullet.x == myGamePiece.x ) {
                health = zeros++;
	if (health >= 5) {
	 mysound.stop();
            myMusic.play();
            myGameArea.stop();
            return;
	}
    }

    if (myGameArea.frameNo == 10000000) {
        myGameArea.nextlevel();
    }
    if (myGameArea.frameNo == 1) {
	bulletfire();
	setInterval(bulletfire, 15000);
    }
}

function bulletfire() { 
    ufobullet = new component(20, 10, "h.jpg", mycoin.x, mycoin.y + 37, "image");
      if (mycoin.x >= myGamePiece.x) {
      	ufobullet.speedX = -5;
      }
      if (mycoin.x <= myGamePiece.x) {
	ufobullet.speedX = 5;
      }
      if (mycoin.y >= myGamePiece.y) {
	ufobullet.speedY = -5;
      }
      if (mycoin.y <= myGamePiece.y) {
	ufobullet.speedY = 5;
      }
}
function sound(src) {
    this.sound = document.createElement("audio");
    this.sound.src = src;
    this.sound.setAttribute("preload", "auto");
    this.sound.setAttribute("controls", "none");
    this.sound.style.display = "none";
    this.sound.loop = true;
    document.body.appendChild(this.sound);
    this.play = function(){
        this.sound.play();
    }
    this.stop = function(){
        this.sound.pause();
    }   
}

function everyinterval(n) {
    if ((myGameArea.frameNo / n) % 1 == 0) {return true;}
    return false;
}

function clearmove() {
    myGamePiece.speedX = 0; 
    myGamePiece.speedY = 0; 
}


function change() {
    document.body.innerHTML = "";
const img = new Image(200, 100); // width, height
img.src = "UFO2.png";
document.body.appendChild(img);
}

function windowClose() {
    window.open('','_parent','');
    window.close();
}
</script>

        window.alert("For firing bullets to collect coin press spacebar and aim to coin to collect. To collect coins many bullets can be needed for one coin.");
    </SCRIPT>
</body>
