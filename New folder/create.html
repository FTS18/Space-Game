<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <script src="../assets/js/main.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Kz9EVkEtNSW1p6E0Y");
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            outline: none;
            border: none;
        }
        
        body {
            background: #000;
        }
        
        .feedback {
            position: absolute;
            top: 350px;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            color: #fff;
            width: 80%;
            height: auto;
            padding: 50px;
            border-radius: 25px;
        }
        
        .f-group h5 {
            font-size: 30px;
            margin: 20px 0px;
        }
        
        .f-control {
            width: 100%;
            background: #333;
            outline: none;
            border: none;
            padding: 10px;
            font-size: 18px;
            border-radius: 7px;
        }
        
        .btn-primary {
            margin: 20px 0px;
            padding: 10px 20px;
            border-radius: 2px;
            background: #ff0040;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="feedback">
        <div class="f-form">
            <h1>Feedback</h1>
            <div class="f-group">
                <h5 for="name">Name</h5>
                <input type="text" class="f-control" id="name" placeholder="Enter name" />
            </div>
            <div class="f-group">
                <h5 for="message">Message</h5>
                <textarea class="f-control" id="message" rows="6"></textarea>
            </div>
            <button class="btn-primary" onclick="sendMail()">Submit</button>
        </div>
    </div>
</body>

</html>
