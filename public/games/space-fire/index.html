<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script type="module" src="/assets/js/main.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jersey+10&display=swap');
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none; /* Prevent scroll on touch */
}
body, button, input, select, textarea {
    font-family: 'Jersey 10', sans-serif;
}
#canvas-container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}
canvas {
    border: none;
    background-color: #050510;
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.game-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(14, 12, 21, 0.85);
    backdrop-filter: blur(5px);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #0e0c15;
    border: 2px solid #282335;
    padding: 30px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-sizing: border-box;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    color: white;
}
.modal-content h2 {
    color: #dfc06f !important;
    font-size: 40px;
    margin: 0 0 15px 0 !important;
    letter-spacing: 2px;
}
.modal-content p {
    color: #9692a8 !important;
    font-size: 20px;
    margin: 0 0 25px 0 !important;
    line-height: 1.4;
    letter-spacing: 1px;
}
.modal-content p span {
    color: #ffffff !important;
    font-weight: bold;
}
.modal-btn {
    background: #dfc06f;
    color: #0e0c15;
    border: 2px solid #dfc06f;
    padding: 10px 25px;
    font-size: 20px;
    font-weight: bold;
    font-family: 'Jersey 10', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
}
.modal-btn:hover {
    background: #0e0c15;
    color: #dfc06f;
}
</style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="start-modal" class="game-modal" style="display: flex;">
        <div class="modal-content">
            <h2>SPACE FIRE</h2>
            <p>Drag or use Arrow Keys to move. Auto-fire is engaged!<br/><br/>Survive the asteroid fields, destroy enemy cruisers, and defeat the Mothership.</p>
            <button class="modal-btn" onclick="startGame()">START MISSION</button>
        </div>
    </div>

    <div id="game-modal" class="game-modal" style="display: none;">
        <div class="modal-content">
            <h2>MISSION FAILED</h2>
            <p>Enemies Destroyed: <span id="modal-ufo-score">0</span></p>
            <p>Score: <span id="modal-score">0</span></p>
            <button class="modal-btn" onclick="restartGame()">TRY AGAIN</button>
        </div>
    </div>

<script>
// ======== ASSETS ========
var imgShip = new Image(); imgShip.src = "ghg.png";
var imgUfo = new Image(); imgUfo.src = "UFO2.png";
var imgAsteroid = new Image(); imgAsteroid.src = "asteriod.png";
var imgKamikaze = new Image(); imgKamikaze.src = "kamikaze_v4.png";
var imgCruiser = new Image(); imgCruiser.src = "cruiser_v4.png";
var imgBoss = new Image(); imgBoss.src = "boss_v4.png";
var imgShield = new Image(); imgShield.src = "shield_v4.png";
var imgWeapon = new Image(); imgWeapon.src = "weapon_v4.png";
var imgHealth = new Image(); imgHealth.src = "health_v4.png";

// ======== GLOBALS ========
var canvas, ctx;
var gameInterval;
var frameNo = 0;
var isVertical = false; // true if height > width

var CW = 0;
var CH = 0;

// Inputs
var keys = {};
var touchActive = false;
var targetX = 0, targetY = 0;

// Player
var ship = {
    x: 0, y: 0, w: 80, h: 45,
    vx: 0, vy: 0,
    accel: 0.8, friction: 0.9, maxSpeed: 12,
    health: 5, maxHealth: 5,
    hasShield: false,
    multiShot: 0, // timer for multi-shot powerup
    lastShotTime: 0, shotCooldown: 200
};

// Entities
var playerBullets = [];
var enemyBullets = [];
var enemies = [];
var particles = [];
var powerups = [];
var stars = [[], [], []];

var shakeDuration = 0;
var score = 0;
var kills = 0;
var bossSpawned = false;
var bossDefeated = false;

// Audio
function playSoundSafely(fn) {
    if (typeof fn === 'function') {
        try { fn(); } catch(e){}
    }
}

// ======== INITIALIZATION ========
function initCanvas() {
    var container = document.getElementById('canvas-container');
    container.innerHTML = '';
    canvas = document.createElement('canvas');
    ctx = canvas.getContext('2d');
    container.appendChild(canvas);
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
    CW = window.innerWidth;
    CH = window.innerHeight;
    canvas.width = CW;
    canvas.height = CH;
    isVertical = CH > CW;
    
    if (isVertical) {
        ship.w = 55; ship.h = 90; // Swap orientation shape visually
    } else {
        ship.w = 90; ship.h = 55;
    }
}

function initStars() {
    stars = [[], [], []];
    for(var l=0; l<3; l++) {
        var numStars = 200; // Increased to cover massive area
        for(var i=0; i<numStars; i++) {
            stars[l].push({
                x: Math.random() * 3000,
                y: Math.random() * 3000,
                size: Math.random() * (3-l) + 1,
                alpha: Math.random() * 0.5 + 0.3
            });
        }
    }
}

function startGame() {
    document.getElementById('start-modal').style.display = 'none';
    document.getElementById('game-modal').style.display = 'none';
    
    // Automatically go fullscreen when starting
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
    }
    
    initCanvas();
    initStars();
    
    // Setup inputs
    window.addEventListener('keydown', e => { 
        keys[e.keyCode] = true; 
        if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
            e.preventDefault();
        }
    }, {passive: false});
    window.addEventListener('keyup', e => { keys[e.keyCode] = false; });
    
    canvas.addEventListener('touchstart', e => {
        touchActive = true;
        updateTouchTarget(e);
    }, {passive: false});
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        updateTouchTarget(e);
    }, {passive: false});
    canvas.addEventListener('touchend', e => {
        touchActive = false;
    });

    // Reset game state
    frameNo = 0; score = 0; kills = 0;
    playerBullets = []; enemyBullets = []; enemies = []; particles = []; powerups = [];
    bossSpawned = false; bossDefeated = false; shakeDuration = 0;
    
    ship.health = ship.maxHealth;
    ship.hasShield = false;
    ship.multiShot = 0;
    ship.vx = 0; ship.vy = 0;
    
    if (isVertical) {
        ship.x = CW/2 - ship.w/2;
        ship.y = CH - 150;
    } else {
        ship.x = 100;
        ship.y = CH/2 - ship.h/2;
    }
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(updateGame, 1000/60); // 60 FPS
}

function updateTouchTarget(e) {
    if(e.touches.length > 0) {
        var rect = canvas.getBoundingClientRect();
        targetX = e.touches[0].clientX - rect.left;
        targetY = e.touches[0].clientY - rect.top;
    }
}

function gameOver() {
    clearInterval(gameInterval);
    playSoundSafely(window.playGameOverSound);
    document.getElementById('modal-ufo-score').innerText = kills;
    document.getElementById('modal-score').innerText = Math.floor(score + kills*100);
    document.getElementById('game-modal').style.display = 'flex';
    
    if (window.parent) {
        window.parent.postMessage({ type: 'FINIXX_GAME_OVER', game: 'space-fire', score: Math.floor(score + kills*100) }, '*');
    }
}

function restartGame() {
    window.location.reload();
}

// ======== SPAWNERS ========
function spawnEnemy() {
    if (bossSpawned) return;
    
    var rand = Math.random();
    var type = 'ufo';
    var w = 60, h = 40, hp = 1;
    var img = imgUfo;
    
    if (rand > 0.9) {
        type = 'cruiser'; img = imgCruiser; w = 100; h = 80; hp = 6;
    } else if (rand > 0.7) {
        type = 'kamikaze'; img = imgKamikaze; w = 40; h = 40; hp = 1;
    } else if (rand > 0.5) {
        type = 'asteroid'; img = imgAsteroid; w = 50; h = 50; hp = 2;
    }
    
    if (isVertical) {
        var ew = isVertical && type !== 'asteroid' ? h : w;
        var eh = isVertical && type !== 'asteroid' ? w : h;
        enemies.push({
            type: type, img: img, hp: hp,
            x: Math.random() * (CW - ew), y: -eh - 50,
            w: ew, h: eh,
            vx: (Math.random() - 0.5) * 2, vy: type==='kamikaze' ? 6 : (type==='cruiser' ? 1.5 : 3),
            timer: 0
        });
    } else {
        enemies.push({
            type: type, img: img, hp: hp,
            x: CW + 50, y: Math.random() * (CH - h),
            w: w, h: h,
            vx: type==='kamikaze' ? -6 : (type==='cruiser' ? -1.5 : -3), vy: (Math.random() - 0.5) * 2,
            timer: 0
        });
    }
}

function spawnBoss() {
    bossSpawned = true;
    playSoundSafely(window.playExplosionSound);
    if (isVertical) {
        enemies.push({
            type: 'boss', img: imgBoss, hp: 60,
            x: CW/2 - 100, y: -200, w: 200, h: 120,
            vx: 1.5, vy: 1, timer: 0, maxHp: 60
        });
    } else {
        enemies.push({
            type: 'boss', img: imgBoss, hp: 60,
            x: CW + 50, y: CH/2 - 100, w: 120, h: 200,
            vx: -1, vy: 1.5, timer: 0, maxHp: 60
        });
    }
}

function spawnPowerup(ex, ey) {
    var types = ['shield', 'weapon', 'health'];
    var t = types[Math.floor(Math.random() * types.length)];
    var img = t === 'shield' ? imgShield : (t === 'weapon' ? imgWeapon : imgHealth);
    powerups.push({
        type: t, img: img, x: ex, y: ey, w: 35, h: 35,
        vx: isVertical ? 0 : -2, vy: isVertical ? 2 : 0
    });
}

// ======== PHYSICS & LOGIC ========
function updateGame() {
    frameNo++;
    score += 0.1;
    
    // Progression
    if (frameNo % (isVertical ? 90 : 70) === 0 && !bossSpawned) spawnEnemy();
    if (kills >= 30 && !bossSpawned) spawnBoss();
    
    if (ship.multiShot > 0) ship.multiShot--;

    // Movement logic
    if (touchActive) {
        var dx = targetX - (ship.x + ship.w/2);
        var dy = targetY - (ship.y + ship.h/2);
        ship.vx += dx * 0.03;
        ship.vy += dy * 0.03;
    } else {
        if (keys[37]) ship.vx -= ship.accel; // L
        if (keys[39]) ship.vx += ship.accel; // R
        if (keys[38]) ship.vy -= ship.accel; // U
        if (keys[40]) ship.vy += ship.accel; // D
    }
    
    ship.vx *= ship.friction;
    ship.vy *= ship.friction;
    
    // Clamp Speed
    ship.vx = Math.max(-ship.maxSpeed, Math.min(ship.maxSpeed, ship.vx));
    ship.vy = Math.max(-ship.maxSpeed, Math.min(ship.maxSpeed, ship.vy));
    
    ship.x += ship.vx;
    ship.y += ship.vy;
    
    // Bounds
    if (ship.x < 0) { ship.x = 0; ship.vx = 0; }
    if (ship.x > CW - ship.w) { ship.x = CW - ship.w; ship.vx = 0; }
    if (ship.y < 0) { ship.y = 0; ship.vy = 0; }
    if (ship.y > CH - ship.h) { ship.y = CH - ship.h; ship.vy = 0; }
    
    // Auto-fire
    if (frameNo - ship.lastShotTime > (ship.multiShot > 0 ? 12 : 18)) {
        firePlayerWeapon();
        ship.lastShotTime = frameNo;
    }

    // Engine Thruster particles
    if (frameNo % 2 === 0) {
        var tx = isVertical ? ship.x + ship.w/2 : ship.x;
        var ty = isVertical ? ship.y + ship.h : ship.y + ship.h/2;
        particles.push({
            x: tx + (Math.random()-0.5)*10, y: ty + (Math.random()-0.5)*10,
            vx: isVertical ? 0 : -Math.random()*2-2, vy: isVertical ? Math.random()*2+2 : 0,
            size: Math.random()*4+2, life: 1.0, decay: 0.05, color: '#ff6600',
            angle: 0, angularVel: 0
        });
    }

    updateEntities();
    checkCollisions();
    render();
}

function firePlayerWeapon() {
    playSoundSafely(window.playLaserSound);
    
    // Recoil
    if (isVertical) ship.vy += 1;
    else ship.vx -= 1;
    
    var bspeed = 18;
    var bx = isVertical ? ship.x + ship.w/2 : ship.x + ship.w;
    var by = isVertical ? ship.y : ship.y + ship.h/2;
    var bvx = isVertical ? 0 : bspeed;
    var bvy = isVertical ? -bspeed : 0;
    
    playerBullets.push({x: bx-4, y: by-4, w: 12, h: 12, vx: bvx, vy: bvy});
    
    if (ship.multiShot > 0) {
        if (isVertical) {
            playerBullets.push({x: bx-4, y: by-4, w: 12, h: 12, vx: -4, vy: bvy*0.9});
            playerBullets.push({x: bx-4, y: by-4, w: 12, h: 12, vx: 4, vy: bvy*0.9});
        } else {
            playerBullets.push({x: bx-4, y: by-4, w: 12, h: 12, vx: bvx*0.9, vy: -4});
            playerBullets.push({x: bx-4, y: by-4, w: 12, h: 12, vx: bvx*0.9, vy: 4});
        }
    }
}

function createExplosion(x, y, color, amount) {
    for (var i=0; i<amount; i++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = Math.random() * 5 + 2;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
            size: Math.random()*5+3, life: 1.0, decay: 0.03, color: color,
            angle: Math.random()*360, angularVel: (Math.random()-0.5)*10
        });
    }
}

function takeDamage() {
    if (ship.hasShield) {
        ship.hasShield = false;
        createExplosion(ship.x+ship.w/2, ship.y+ship.h/2, '#00ffff', 20);
        shakeDuration = 10;
        playSoundSafely(window.playExplosionSound);
        return;
    }
    ship.health--;
    shakeDuration = 20;
    createExplosion(ship.x+ship.w/2, ship.y+ship.h/2, '#ff3300', 30);
    playSoundSafely(window.playExplosionSound);
    
    if (ship.health <= 0) {
        gameOver();
    }
}

function updateEntities() {
    // Player Bullets
    for (var i=playerBullets.length-1; i>=0; i--) {
        var b = playerBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < -50 || b.x > CW+50 || b.y < -50 || b.y > CH+50) playerBullets.splice(i, 1);
    }
    
    // Enemy Bullets
    for (var i=enemyBullets.length-1; i>=0; i--) {
        var b = enemyBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < -50 || b.x > CW+50 || b.y < -50 || b.y > CH+50) enemyBullets.splice(i, 1);
    }
    
    // Powerups
    for (var i=powerups.length-1; i>=0; i--) {
        var p = powerups[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < -100 || p.x > CW+100 || p.y < -100 || p.y > CH+100) powerups.splice(i, 1);
    }

    // Enemies
    for (var i=enemies.length-1; i>=0; i--) {
        var e = enemies[i];
        e.timer++;
        
        // Kamikaze homing
        if (e.type === 'kamikaze') {
            var dx = (ship.x+ship.w/2) - (e.x+e.w/2);
            var dy = (ship.y+ship.h/2) - (e.y+e.h/2);
            var mag = Math.sqrt(dx*dx+dy*dy);
            if (mag > 0) {
                e.vx += (dx/mag) * 0.15;
                e.vy += (dy/mag) * 0.15;
            }
        }
        
        // Boss Logic
        if (e.type === 'boss') {
            if (isVertical) {
                if (e.y < 50) e.vy = 1; else e.vy = 0;
                if (e.x < 50) e.vx = 2;
                if (e.x > CW - e.w - 50) e.vx = -2;
            } else {
                if (e.x > CW - e.w - 50) e.vx = -1; else e.vx = 0;
                if (e.y < 50) e.vy = 2;
                if (e.y > CH - e.h - 50) e.vy = -2;
            }
            
            if (e.timer % 60 === 0) { // Shoot multi directions
                var dirs = isVertical ? [[0,5], [-3,4], [3,4]] : [[-5,0], [-4,-3], [-4,3]];
                dirs.forEach(d => {
                    enemyBullets.push({x: e.x+e.w/2, y: e.y+e.h/2, w: 14, h: 14, vx: d[0], vy: d[1]});
                });
            }
        }
        
        // Cruiser Logic
        if (e.type === 'cruiser' && e.timer % 80 === 0) {
            var bvx = isVertical ? 0 : -7;
            var bvy = isVertical ? 7 : 0;
            enemyBullets.push({x: e.x+e.w/2, y: e.y+e.h/2, w: 12, h: 12, vx: bvx, vy: bvy});
        }
        
        e.x += e.vx; e.y += e.vy;
        
        // Despawn
        if (e.type !== 'boss' && (e.x < -200 || e.x > CW+200 || e.y < -200 || e.y > CH+200)) {
            enemies.splice(i, 1);
        }
    }
    
    // Particles
    for (var i=particles.length-1; i>=0; i--) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.angle += p.angularVel;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    // Stars Parallax
    var sVx = isVertical ? 0 : -1;
    var sVy = isVertical ? 1 : 0;
    for(var l=0; l<3; l++) {
        var speedM = (3-l);
        stars[l].forEach(s => {
            s.x += sVx * speedM;
            s.y += sVy * speedM;
            if (s.x < 0) s.x = 3000;
            if (s.x > 3000) s.x = 0;
            if (s.y < 0) s.y = 3000;
            if (s.y > 3000) s.y = 0;
        });
    }
}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function checkCollisions() {
    // Player bullets hit Enemies
    for (var i=playerBullets.length-1; i>=0; i--) {
        var b = playerBullets[i];
        var hit = false;
        for (var j=enemies.length-1; j>=0; j--) {
            var e = enemies[j];
            if (rectIntersect(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
                e.hp--;
                hit = true;
                createExplosion(b.x, b.y, '#dfc06f', 5);
                if (e.hp <= 0) {
                    kills++;
                    createExplosion(e.x+e.w/2, e.y+e.h/2, '#ffffff', e.type==='boss'?100:20);
                    playSoundSafely(window.playExplosionSound);
                    
                    if (e.type === 'boss') {
                        bossDefeated = true;
                        score += 5000;
                        setTimeout(spawnBoss, 10000); // Infinite loop, harder bosses?
                    } else if (Math.random() > 0.85) {
                        spawnPowerup(e.x+e.w/2, e.y+e.h/2);
                    }
                    enemies.splice(j, 1);
                }
                break; // bullet dies
            }
        }
        if (hit) playerBullets.splice(i, 1);
    }
    
    // Player hit by Enemies
    for (var i=enemies.length-1; i>=0; i--) {
        var e = enemies[i];
        if (rectIntersect(ship.x, ship.y, ship.w, ship.h, e.x, e.y, e.w, e.h)) {
            takeDamage();
            if (e.type !== 'boss') {
                createExplosion(e.x+e.w/2, e.y+e.h/2, '#ffffff', 20);
                enemies.splice(i, 1);
            }
        }
    }
    
    // Player hit by Enemy Bullets
    for (var i=enemyBullets.length-1; i>=0; i--) {
        var b = enemyBullets[i];
        if (rectIntersect(ship.x, ship.y, ship.w, ship.h, b.x, b.y, b.w, b.h)) {
            takeDamage();
            enemyBullets.splice(i, 1);
        }
    }
    
    // Player collects Powerups
    for (var i=powerups.length-1; i>=0; i--) {
        var p = powerups[i];
        if (rectIntersect(ship.x, ship.y, ship.w, ship.h, p.x, p.y, p.w, p.h)) {
            if (p.type === 'shield') ship.hasShield = true;
            if (p.type === 'weapon') ship.multiShot = 600; // 10 seconds of multi-shot
            if (p.type === 'health') ship.health = Math.min(ship.maxHealth, ship.health + 2);
            playSoundSafely(window.playCoinSound);
            powerups.splice(i, 1);
        }
    }
}

function render() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, CW, CH);
    
    ctx.save();
    if (shakeDuration > 0) {
        ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        shakeDuration--;
    }
    
    // Draw Stars
    for(var l=0; l<3; l++) {
        stars[l].forEach(s => {
            ctx.globalAlpha = s.alpha;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
    }
    ctx.globalAlpha = 1.0;
    
    // Draw Ship
    ctx.save();
    ctx.translate(ship.x + ship.w/2, ship.y + ship.h/2);
    if (isVertical) {
        ctx.rotate(-Math.PI/2); // Rotate ship if vertical
        ctx.drawImage(imgShip, -ship.h/2, -ship.w/2, ship.h, ship.w);
    } else {
        ctx.drawImage(imgShip, -ship.w/2, -ship.h/2, ship.w, ship.h);
    }
    ctx.restore();
    
    if (ship.hasShield) {
        ctx.beginPath();
        ctx.arc(ship.x+ship.w/2, ship.y+ship.h/2, Math.max(ship.w, ship.h)*0.8, 0, Math.PI*2);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
        ctx.fill();
    }
    
    // Draw Enemies
    enemies.forEach(e => {
        ctx.save();
        ctx.translate(e.x + e.w/2, e.y + e.h/2);
        if (isVertical && e.type !== 'asteroid' && e.type !== 'boss') ctx.rotate(Math.PI/2);
        
        var dw = isVertical && e.type !== 'asteroid' && e.type !== 'boss' ? e.h : e.w;
        var dh = isVertical && e.type !== 'asteroid' && e.type !== 'boss' ? e.w : e.h;
        
        if (e.type === 'asteroid') {
            ctx.rotate(frameNo * 0.05); // Spin asteroids
        }
        ctx.drawImage(e.img, -dw/2, -dh/2, dw, dh);
        
        // Boss health bar
        if (e.type === 'boss') {
            ctx.fillStyle = 'red';
            ctx.fillRect(-dw/2, -dh/2 - 15, dw * (e.hp/e.maxHp), 8);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(-dw/2, -dh/2 - 15, dw, 8);
        }
        ctx.restore();
    });
    
    // Draw Powerups
    powerups.forEach(p => {
        ctx.drawImage(p.img, p.x, p.y, p.w, p.h);
    });
    
    // Draw Bullets
    ctx.fillStyle = '#dfc06f';
    playerBullets.forEach(b => { ctx.fillRect(b.x, b.y, b.w, b.h); });
    ctx.fillStyle = '#ff3333';
    enemyBullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x+b.w/2, b.y+b.h/2, b.w/2, 0, Math.PI*2);
        ctx.fill();
    });
    
    // Draw Particles
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI/180);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
    });
    
    ctx.restore(); // End shake translate
    
    // UI
    ctx.fillStyle = '#dfc06f';
    ctx.font = '24px "Jersey 10", sans-serif';
    ctx.fillText("SCORE: " + Math.floor(score), 20, 30);
    ctx.fillText("KILLS: " + kills, 20, 60);
    
    // Health Bar
    ctx.fillText("HEALTH:", 20, 90);
    for(var i=0; i<ship.maxHealth; i++) {
        ctx.fillStyle = i < ship.health ? '#00ff00' : '#444444';
        ctx.fillRect(100 + i*25, 75, 20, 18);
    }
}
</script>
