<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe | Retro Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="/assets/js/main.js"></script>

    <!-- Compat Firebase SDKs (v10) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="disabledScroll">
    <!-- Staggered boot loader -->
    <div class="loading-screen">
        <div class="col"></div>
        <div class="col"></div>
        <div class="col"></div>
        <div class="col"></div>
        <div class="col"></div>
        <div class="col"></div>
        <div class="brand">
            <h1>FINIXX</h1>
            <p>LOADING CABINET...</p>
        </div>
    </div>

    <div class="game-container">
        <div class="hud-header">
            <h1 class="game-title">TIC TAC TOE</h1>
        </div>

        <!-- Mode Select Bar -->
        <div class="control-deck">
            <div class="mode-select">
                <button id="btn-pvp" class="mode-btn active">VS PLAYER</button>
                <button id="btn-pve" class="mode-btn">VS COMPUTER</button>
                <button id="btn-online" class="mode-btn">VS ONLINE</button>
            </div>
            <div id="diff-select" class="mode-select" style="display: none; margin-top: 10px;">
                <button id="btn-easy" class="mode-btn active">EASY</button>
                <button id="btn-hard" class="mode-btn">IMPOSSIBLE</button>
            </div>
        </div>

        <!-- Score Board -->
        <div class="score-board">
            <div class="score-card">
                <span class="label" id="label-x">PLAYER X</span>
                <span id="score-x" class="value">0</span>
            </div>
            <div class="score-card">
                <span class="label">TIES</span>
                <span id="score-ties" class="value">0</span>
            </div>
            <div class="score-card">
                <span id="label-o" class="label">PLAYER O</span>
                <span id="score-o" class="value">0</span>
            </div>
        </div>

        <!-- Tic Tac Toe Grid -->
        <div class="board-wrapper">
            <div class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <!-- Win Line Vector Overlay -->
            <svg id="win-line-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none;">
                <line id="win-line" x1="0" y1="0" x2="0" y2="0" stroke="#dfc06f" stroke-width="8" stroke-linecap="round" style="transition: stroke-dashoffset 0.4s ease-out;" />
            </svg>
        </div>

        <!-- Turn Indicator -->
        <div class="turn-indicator">
            CURRENT TURN: <span id="current-player" class="gold-text">X</span>
        </div>
    </div>

    <!-- Custom Inline Modal -->
    <div id="game-modal" class="game-modal" style="display: none;">
        <div class="modal-content">
            <h2 id="modal-title">GAME OVER</h2>
            <p>FINAL SCORE</p>
            <p id="modal-score" style="font-size: 28px; color: #fff; margin: 10px 0;"></p>
            <button class="modal-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Lobby Overlay Modal (Online Play Setup) -->
    <div id="lobby-overlay" class="lobby-overlay" style="display: none;">
        <div class="lobby-box" id="lobby-setup-view">
            <div class="lobby-title">TIC TAC TOE ONLINE</div>
            
            <input type="text" id="player-name-input" class="lobby-input" placeholder="ENTER NAME" maxlength="12">
            
            <button class="btn-action" id="btn-create-room">CREATE PRIVATE LOBBY</button>
            
            <div style="display: flex; width: 100%; gap: 10px;">
                <input type="text" id="room-code-input" class="lobby-input" style="width: 50%; margin-bottom: 0;" placeholder="ROOM CODE" maxlength="4">
                <button class="btn-action" id="btn-join-room" style="width: 50%; margin-bottom: 0;">JOIN LOBBY</button>
            </div>
            <button class="btn-action secondary" id="btn-cancel-online" style="margin-top: 15px;">CANCEL</button>
        </div>

        <div class="lobby-box" id="lobby-waiting-view" style="display: none;">
            <div class="lobby-title">LOBBY ACTIVE</div>
            <div style="font-size: 24px; color: #dfc06f; margin-bottom: 15px;">
                ROOM CODE: <span id="lobby-code-display" style="color: #fff; font-weight: bold;">----</span>
            </div>
            
            <div class="lobby-players" id="lobby-players-list">
                <!-- Players wait list -->
            </div>

            <div id="wait-player-msg" style="color: #55506a; font-size: 18px; text-align: center; margin-bottom: 10px;">
                WAITING FOR CHALLENGER...
            </div>
            <button class="btn-action secondary" id="btn-leave-lobby">LEAVE LOBBY</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
